<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ĐỘ NHẠY CHUẨN OB54 VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800;900&family=Orbitron:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050508;
            --panel-bg: #0d0d12;
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
        }

        body {
            margin: 0;
            padding: 40px 0; 
            background-color: var(--bg-color);
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            box-sizing: border-box;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        #snowCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .avatar-container {
            position: relative;
            width: 115px;   
            height: 115px;  
            margin-bottom: 16px; 
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 200%;
            animation: avatarNeon 3s ease infinite;
            box-shadow: 0 0 25px #00ffff, 0 0 45px #ff00ff, inset 0 0 15px rgba(255, 255, 255, 0.6);
        }

        @keyframes avatarNeon {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 15%;
            background: #121216;
            display: block;
        }

        .header-group {
            text-align: center;
            margin-bottom: 25px; 
        }

        .header-group h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px; 
            font-weight: 900;
            margin: 0 0 6px 0;
            letter-spacing: 0.8px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3), 0 2px 4px rgba(0,0,0,0.8);
        }

        .header-group .admin-sub {
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            margin: 0;
            letter-spacing: 0.5px;
            opacity: 0.85; 
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        .container {
            position: relative;
            width: 380px; 
            padding: 40px 32px; 
            border-radius: 24px;
            text-align: center;
            box-sizing: border-box;
            border: 4px solid transparent;
            background-image: linear-gradient(135deg, rgba(20, 15, 30, 0.98) 0%, rgba(10, 10, 15, 1) 100%), 
                              linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #9400d3, #ff0000);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            background-size: 100% 100%, 300% 100%;
            animation: rainbowBorder 4s linear infinite;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 0 0 30px rgba(255, 0, 128, 0.1);
        }

        @keyframes rainbowBorder {
            0% { background-position: 0% 0%, 0% 0%; }
            100% { background-position: 0% 0%, 300% 0%; }
        }

        .sub-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px; 
            font-weight: 800;
            color: #ffffff; /* Đã chuyển sang màu trắng */
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 5px; 
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            background: rgba(25, 25, 35, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #ffffff; 
            border: none;
            border-radius: 14px;
            color: #000000; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.2);
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn:hover {
            background: #f4f4f5;
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.5);
            transform: translateY(-1px);
        }

        .result-box {
            margin-top: 25px;
            text-align: left;
            display: none; 
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            transform: translateY(10px);
        }

        .result-title {
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 22px;
            border-left: 4px solid #ffffff;
            padding-left: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .stat-group { margin-bottom: 18px; }
        .stat-info { display: flex; justify-content: space-between; font-size: 14px; font-weight: 500; color: var(--text-sub); margin-bottom: 6px; }
        .stat-info .num-val { font-weight: 700; color: #ffffff; }
        .progress-container { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.08); border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff0055, #ff5500, #ffcc00, #33ff00, #00ffff, #0022ff, #7700ff, #ff0055); background-size: 200% 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1); animation: rainbowFlow 2s linear infinite; }
        @keyframes rainbowFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        .extra-specs { margin-top: 25px; padding: 1px; background: rgba(255, 255, 255, 0.12); border-radius: 16px; }
        .spec-card { background: rgba(20, 20, 30, 0.7); border-radius: 15px; padding: 16px 10px; text-align: center; }
        .spec-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; font-weight: 800; letter-spacing: 1px; }
        .spec-value { font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 900; letter-spacing: 0.5px; }
        #valNutBan { background: linear-gradient(135deg, #38bdf8 0%, #00ffff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .loading { display: none; margin-top: 30px; color: #ffffff; font-size: 13px; font-weight: 500; animation: pulse 1.2s infinite ease-in-out; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

    <canvas id="snowCanvas"></canvas>

    <div class="wrapper">
        <div class="avatar-container">
            <img src="https://i.ibb.co/N6LMhCT3/image.jpg" alt="Itoshi Sae Avatar">
        </div>

        <div class="header-group">
            <h2>ĐỘ NHẠY CHUẨN OB54 VIP</h2>
            <div class="admin-sub">Admin: @sae_lovetiktok</div>
        </div>

        <div class="container">
            <div class="search-box">
                <div class="sub-header">SUPER SENSITIVITY🎯</div>
                <input type="text" id="deviceInput" placeholder="Nhập tên thiết bị 📱" autocomplete="off">
                <button class="btn" onclick="searchSensitivity()">PHÂN TÍCH THIẾT BỊ</button>
            </div>
            
            <div class="loading" id="loadingText">❄️ Hệ thống chúng tôi đang phân tích độ nhạy vui lòng chờ đợi...</div>

            <div class="result-box" id="resultBox">
                <div class="result-title" id="displayDeviceName">KẾT QUẢ PHÂN TÍCH THIẾT BỊ</div>
                
                <div class="stat-group">
                    <div class="stat-info"><span>Nhìn xung quanh</span> <span class="num-val" id="xungQuanh">0</span></div>
                    <div class="progress-container"><div class="progress-bar" id="barXungQuanh"></div></div>
                </div>

                <div class="stat-group">
                    <div class="stat-info"><span>Ống ngắm hồng tâm</span> <span class="num-val" id="hongTam">0</span></div>
                    <div class="progress-container"><div class="progress-bar" id="barHongTam"></div></div>
                </div>

                <div class="stat-group">
                    <div class="stat-info"><span>Ống ngắm 2x</span> <span class="num-val" id="scope2x">0</span></div>
                    <div class="progress-container"><div class="progress-bar" id="barScope2x"></div></div>
                </div>

                <div class="stat-group">
                    <div class="stat-info"><span>Ống ngắm 4x</span> <span class="num-val" id="scope4x">0</span></div>
                    <div class="progress-container"><div class="progress-bar" id="barScope4x"></div></div>
                </div>

                <div class="stat-group">
                    <div class="stat-info"><span>Ống ngắm súng ngắm</span> <span class="num-val" id="sungNgam">0</span></div>
                    <div class="progress-container"><div class="progress-bar" id="barSungNgam"></div></div>
                </div>

                <div class="stat-group">
                    <div class="stat-info"><span>Nút camera tự do</span> <span class="num-val" id="cameraTuDo">0</span></div>
                    <div class="progress-container"><div class="progress-bar" id="barCameraTuDo"></div></div>
                </div>

                <div class="extra-specs">
                    <div class="spec-card">
                        <div class="spec-label">CỠ NÚT BẮN TỐI ƯU</div>
                        <div class="spec-value" id="valNutBan">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });

        const maxFlakes = 85; 
        const flakes = [];

        class Snowflake {
            constructor() { this.reset(); this.y = Math.random() * height; }
            reset() { this.x = Math.random() * width; this.y = -30; this.fontSize = Math.random() * 11 + 9; this.speed = Math.random() * 0.5 + 0.3; this.opacity = Math.random() * 0.5 + 0.25; this.spin = Math.random() * 0.02 - 0.01; this.angle = Math.random() * Math.PI * 2; }
            update() { this.y += this.speed; this.angle += this.spin; this.x += Math.sin(this.y / 40) * 0.3; if (this.y > height + 20 || this.x > width + 20 || this.x < -20) this.reset(); }
            draw() { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle); ctx.shadowBlur = 6; ctx.shadowColor = "rgba(255, 255, 255, 0.4)"; ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.font = `${this.fontSize}px Arial, sans-serif`; ctx.textBaseline = 'middle'; ctx.textAlign = 'center'; ctx.fillText('❄', 0, 0); ctx.restore(); }
        }

        for (let i = 0; i < maxFlakes; i++) flakes.push(new Snowflake());
        function animate() { ctx.clearRect(0, 0, width, height); flakes.forEach(flake => { flake.update(); flake.draw(); }); requestAnimationFrame(animate); }
        animate();

        function getRandomValue(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function searchSensitivity() {
            const inputEl = document.getElementById('deviceInput');
            const loadingText = document.getElementById('loadingText');
            const resultBox = document.getElementById('resultBox');
            const displayTitle = document.getElementById('displayDeviceName');
            const deviceName = inputEl.value.trim();

            if (deviceName === "") { alert("Vui lòng nhập tên thiết bị của bạn!"); return; }
            resultBox.style.display = 'none'; resultBox.style.opacity = '0'; resultBox.style.transform = 'translateY(10px)';
            document.querySelectorAll('.progress-bar').forEach(bar => bar.style.width = '0%');
            loadingText.style.display = 'block';

            setTimeout(() => {
                loadingText.style.display = 'none'; resultBox.style.display = 'block';
                displayTitle.innerText = `PHÂN TÍCH THIẾT BỊ: ${deviceName.toUpperCase()}`;
                const valXungQuanh = getRandomValue(150, 199), valHongTam = getRandomValue(100, 180), valScope2x = getRandomValue(100, 180), valScope4x = getRandomValue(100, 180), valSungNgam = getRandomValue(100, 180), valCamera = getRandomValue(100, 180), valNutBan = getRandomValue(35, 55);

                document.getElementById('xungQuanh').innerText = valXungQuanh; document.getElementById('hongTam').innerText = valHongTam; document.getElementById('scope2x').innerText = valScope2x; document.getElementById('scope4x').innerText = valScope4x; document.getElementById('sungNgam').innerText = valSungNgam; document.getElementById('cameraTuDo').innerText = valCamera; document.getElementById('valNutBan').innerText = valNutBan + "%";

                setTimeout(() => {
                    resultBox.style.opacity = '1'; resultBox.style.transform = 'translateY(0)';
                    document.getElementById('barXungQuanh').style.width = (valXungQuanh / 200 * 100) + '%'; document.getElementById('barHongTam').style.width = (valHongTam / 200 * 100) + '%'; document.getElementById('barScope2x').style.width = (valScope2x / 200 * 100) + '%'; document.getElementById('barScope4x').style.width = (valScope4x / 200 * 100) + '%'; document.getElementById('barSungNgam').style.width = (valSungNgam / 200 * 100) + '%'; document.getElementById('barCameraTuDo').style.width = (valCamera / 200 * 100) + '%';
                }, 50);
            }, 2000); 
        }

        document.getElementById('deviceInput').addEventListener('keypress', function(event) { if (event.key === 'Enter') searchSensitivity(); });
    </script>
</body>
</html>
